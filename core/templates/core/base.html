{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TikTakTuk{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>T</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B4A;
            --primary-dark: #e55a3a;
            --primary-light: #FFF0ED;
            --background: #F8F9FA;
            --surface: #FFFFFF;
            --text-primary: #212529;
            --text-secondary: #6C757D;
            --text-muted: #9CA3AF;
            --border: #DEE2E6;
            --error: #EF4444;
            --success: #10B981;
            --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
            --radius: 12px;
            --sidebar-width: 260px;
            --header-height: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
        }

        {% block style %}{% endblock %}
        <style>
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; padding: 16px 0; }
        .sidebar-brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.25rem; color: var(--primary); text-decoration: none; padding: 0 20px 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .sidebar-nav { flex: 1; overflow-y: auto; }
        .sidebar-item { display: block; padding: 10px 20px; color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.875rem; transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar-item:hover { background: var(--background); color: var(--text-primary); }
        .sidebar-item.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); }
        .sidebar-footer { border-top: 1px solid var(--border); padding-top: 16px; margin-top: auto; }
        .user-info { padding: 0 20px 8px; }
        .user-name { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-primary); }
        .user-role { display: block; font-size: 0.75rem; color: var(--text-secondary); }
        .role-switcher { padding: 0 20px 16px; }
        .role-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
        .role-buttons { display: flex; gap: 4px; }
        .role-btn { flex: 1; padding: 6px 8px; text-align: center; background: var(--background); border: 1px solid var(--border); border-radius: 8px; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; }
        .role-btn:hover { background: var(--border); color: var(--text-primary); }
        .role-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .main-content { flex: 1; margin-left: 260px; min-height: 100vh; }
        .header { height: var(--header-height); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 50; }
        .header-left { display: flex; flex-direction: column; }
        .header-title { font-size: 1.125rem; font-weight: 600; }
        .header-subtitle { font-size: 0.875rem; color: var(--text-secondary); }
        .page-content { padding: 32px; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .bento-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
        .stat-card { display: flex; flex-direction: column; gap: 8px; }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-change { font-size: 0.75rem; font-weight: 500; }
        .stat-change.positive { color: var(--success); }
        .grid { display: grid; gap: 24px; }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .card-title { font-size: 1rem; font-weight: 600; }
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .list-item:last-child { border-bottom: none; }
        .item-title { font-weight: 500; margin-bottom: 4px; }
        .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-primary { background: var(--primary-light); color: var(--primary); }
        .action-list { display: flex; flex-direction: column; gap: 8px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius); font-weight: 500; font-size: 0.875rem; font-family: inherit; cursor: pointer; transition: all 0.2s; border: none; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: var(--background); color: var(--text-primary); border: 1px solid var(--border); width: 100%; justify-content: flex-start; }
        .btn-secondary:hover { background: var(--border); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--background); }
        .btn-danger { background: #EF4444; color: white; }
        .btn-danger:hover { background: #DC2626; }
        .btn-sm { padding: 6px 10px; font-size: 0.75rem; }
        .table-actions { display: flex; gap: 8px; }
        .form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.875rem; font-family: inherit; background: var(--surface); transition: border-color 0.2s, box-shadow 0.2s; position: relative; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.15); }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.875rem; }
        .form-label.required::after { content: ' *'; color: var(--error); }
        .form-hint { color: var(--text-muted); font-size: 0.75rem; margin-top: 4px; display: block; }
        .alert { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 16px; font-size: 0.875rem; }
        .alert-error { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
        .alert-success { background: #D1FAE5; color: #065F46; border: 1px solid #A7F3D0; }
        .modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        .modal-card { position: relative; background: var(--surface); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 440px; box-shadow: var(--shadow); margin: 16px; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .modal-title { font-size: 1.125rem; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); padding: 0; line-height: 1; }
        .modal-close:hover { color: var(--text-primary); }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); max-width: 640px; }
        .profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; }
        .profile-header-info { flex: 1; }
        .profile-name { font-size: 1.25rem; font-weight: 600; margin-bottom: 4px; }
        .profile-badge { display: inline-block; padding: 4px 12px; background: var(--primary-light); color: var(--primary); border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .profile-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .profile-field { display: flex; flex-direction: column; gap: 4px; }
        .profile-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .profile-value { font-size: 0.875rem; color: var(--text-primary); font-weight: 500; }
        .profile-actions { display: flex; gap: 12px; margin-top: 24px; }
        .form-input:disabled { background: var(--background); color: var(--text-secondary); cursor: not-allowed; }
        </style>
</head>
<body>
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
